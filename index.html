<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaga Retro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            color: #fff;
            font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            background: #000;
            display: block;
            box-shadow: 0 0 50px rgba(0, 100, 255, 0.2);
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-transform: uppercase;
        }
        .label { color: #ff0000; font-size: 14px; margin-bottom: 5px; }
        .value { color: #ffffff; font-size: 20px; margin-bottom: 15px; }
        
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 20;
            transition: opacity 0.3s;
        }
        .title {
            font-size: 48px;
            color: #3b82f6;
            margin-bottom: 20px;
            text-shadow: 4px 4px #000;
            letter-spacing: 4px;
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #22c55e;
            border: 4px solid #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .start-btn:hover {
            background: #16a34a;
            transform: scale(1.05);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="label">1UP</div>
        <div id="score" class="value">00</div>
        <div class="label">LIVES</div>
        <div id="lives" class="value">3</div>
    </div>

    <div id="overlay">
        <h1 id="status-title" class="title">GALAGA</h1>
        <p class="mb-8 text-center text-gray-400">
            [LEFT/RIGHT ARROW] MOVE<br>
            [SPACEBAR] FIRE
        </p>
        <button id="start-btn" class="start-btn" onclick="initGame()">START MISSION</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score');
    const livesVal = document.getElementById('lives');
    const overlay = document.getElementById('overlay');
    const statusTitle = document.getElementById('status-title');
    const startBtn = document.getElementById('start-btn');

    // 게임 설정
    let width, height;
    let isRunning = false;
    let score = 0;
    let lives = 3;
    let player, enemies, bullets, enemyBullets, particles, stars;
    const keys = {};

    function resize() {
        width = Math.min(window.innerWidth, 500);
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // 색상 상수
    const COLORS = {
        player: '#00ccff',
        boss: '#8b5cf6',   // Purple
        guard: '#ef4444',  // Red
        grunt: '#22c55e',  // Green
        bullet: '#fbbf24',
        enemyBullet: '#fff'
    };

    class Star {
        constructor() {
            this.reset();
            this.y = Math.random() * height;
        }
        reset() {
            this.x = Math.random() * width;
            this.y = -10;
            this.speed = Math.random() * 3 + 1;
            this.size = Math.random() * 2;
            this.opacity = Math.random();
        }
        update() {
            this.y += this.speed;
            if (this.y > height) this.reset();
        }
        draw() {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    class Player {
        constructor() {
            this.w = 36;
            this.h = 36;
            this.x = width / 2 - this.w / 2;
            this.y = height - 80;
            this.speed = 5;
            this.cooldown = 0;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            // 메인 바디
            ctx.fillStyle = COLORS.player;
            ctx.beginPath();
            ctx.moveTo(18, 0);
            ctx.lineTo(0, 36);
            ctx.lineTo(18, 28);
            ctx.lineTo(36, 36);
            ctx.closePath();
            ctx.fill();
            // 조종석
            ctx.fillStyle = '#fff';
            ctx.fillRect(16, 10, 4, 8);
            // 엔진 불꽃
            if (Math.random() > 0.5) {
                ctx.fillStyle = '#f97316';
                ctx.fillRect(6, 30, 4, 6);
                ctx.fillRect(26, 30, 4, 6);
            }
            ctx.restore();
        }
        update() {
            if (keys['ArrowLeft'] && this.x > 0) this.x -= this.speed;
            if (keys['ArrowRight'] && this.x < width - this.w) this.x += this.speed;
            if (keys['Space'] && this.cooldown <= 0) {
                bullets.push(new Bullet(this.x + this.w / 2, this.y, -8));
                this.cooldown = 15;
            }
            if (this.cooldown > 0) this.cooldown--;
        }
    }

    class Bullet {
        constructor(x, y, vy) {
            this.x = x;
            this.y = y;
            this.vy = vy;
            this.w = 3;
            this.h = 12;
        }
        update() { this.y += this.vy; }
        draw() {
            ctx.fillStyle = this.vy < 0 ? COLORS.bullet : COLORS.enemyBullet;
            ctx.fillRect(this.x - this.w/2, this.y, this.w, this.h);
        }
    }

    class Enemy {
        constructor(bx, by, row) {
            this.bx = bx;
            this.by = by;
            this.x = bx;
            this.y = by;
            this.w = 30;
            this.h = 24;
            this.row = row;
            this.color = row === 0 ? COLORS.boss : (row < 3 ? COLORS.guard : COLORS.grunt);
            this.isDiving = false;
            this.vx = 0;
            this.vy = 0;
            this.phase = Math.random() * Math.PI * 2;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            const wings = Math.sin(Date.now() / 150 + this.phase) * 6;
            
            ctx.fillStyle = this.color;
            // 몸통
            ctx.fillRect(10, 6, 10, 14);
            // 날개 (파리 스타일)
            ctx.beginPath();
            ctx.moveTo(10, 8);
            ctx.lineTo(0 - wings, 0);
            ctx.lineTo(-2 - wings, 16);
            ctx.lineTo(10, 18);
            ctx.moveTo(20, 8);
            ctx.lineTo(30 + wings, 0);
            ctx.lineTo(32 + wings, 16);
            ctx.lineTo(20, 18);
            ctx.fill();
            // 눈
            ctx.fillStyle = '#fff';
            ctx.fillRect(8, 0, 4, 4);
            ctx.fillRect(18, 0, 4, 4);
            ctx.restore();
        }
        update(time) {
            if (!this.isDiving) {
                const sway = Math.sin(time / 1000 + this.phase) * 40;
                this.x = this.bx + sway;
                if (Math.random() < 0.0005) {
                    this.isDiving = true;
                    this.vx = (player.x - this.x) / 60;
                    this.vy = 3;
                }
            } else {
                this.x += this.vx;
                this.y += this.vy;
                if (Math.random() < 0.02) {
                    enemyBullets.push(new Bullet(this.x + 15, this.y + 20, 4));
                }
                if (this.y > height) {
                    this.y = -30;
                    this.isDiving = false;
                }
            }
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6;
            this.life = 1.0;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.03;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 3, 3);
            ctx.globalAlpha = 1;
        }
    }

    function initGame() {
        score = 0;
        lives = 3;
        enemies = [];
        bullets = [];
        enemyBullets = [];
        particles = [];
        stars = Array.from({length: 80}, () => new Star());
        player = new Player();
        
        scoreVal.innerText = '00';
        livesVal.innerText = '3';
        overlay.classList.add('hidden');
        
        spawnEnemies();
        isRunning = true;
        requestAnimationFrame(loop);
    }

    function spawnEnemies() {
        const cols = 8;
        const rows = 5;
        const xSpace = 45;
        const ySpace = 40;
        const startX = (width - (cols - 1) * xSpace) / 2 - 15;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                enemies.push(new Enemy(startX + c * xSpace, 60 + r * ySpace, r));
            }
        }
    }

    function loop(time) {
        if (!isRunning) return;

        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        stars.forEach(s => { s.update(); s.draw(); });
        player.update();
        player.draw();

        // 아군 미사일
        bullets.forEach((b, i) => {
            b.update();
            b.draw();
            if (b.y < 0) bullets.splice(i, 1);
            
            enemies.forEach((e, j) => {
                if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                    for(let k=0; k<10; k++) particles.push(new Particle(e.x + 15, e.y + 12, e.color));
                    enemies.splice(j, 1);
                    bullets.splice(i, 1);
                    score += 100;
                    scoreVal.innerText = score;
                    if (enemies.length === 0) spawnEnemies();
                }
            });
        });

        // 적 미사일
        enemyBullets.forEach((eb, i) => {
            eb.update();
            eb.draw();
            if (eb.y > height) enemyBullets.splice(i, 1);
            if (eb.x > player.x && eb.x < player.x + player.w && eb.y > player.y && eb.y < player.y + player.h) {
                for(let k=0; k<15; k++) particles.push(new Particle(player.x + 18, player.y + 18, COLORS.player));
                enemyBullets.splice(i, 1);
                handleHit();
            }
        });

        // 적 기체 업데이트
        enemies.forEach((e, i) => {
            e.update(time);
            e.draw();
            if (e.x + e.w > player.x && e.x < player.x + player.w && e.y + e.h > player.y && e.y < player.y + player.h) {
                handleHit();
            }
        });

        // 파티클
        particles.forEach((p, i) => {
            p.update();
            p.draw();
            if (p.life <= 0) particles.splice(i, 1);
        });

        requestAnimationFrame(loop);
    }

    function handleHit() {
        lives--;
        livesVal.innerText = lives;
        if (lives <= 0) {
            isRunning = false;
            statusTitle.innerText = "MISSION FAILED";
            statusTitle.classList.replace('text-blue-500', 'text-red-500');
            startBtn.innerText = "RESTART";
            overlay.classList.remove('hidden');
        } else {
            // 위치 리셋
            player.x = width / 2 - player.w / 2;
        }
    }

    // 모바일 터치 지원
    canvas.addEventListener('touchstart', e => {
        const touchX = e.touches[0].clientX - (window.innerWidth - width)/2;
        player.x = Math.max(0, Math.min(width - player.w, touchX - player.w / 2));
        if (player.cooldown <= 0) {
            bullets.push(new Bullet(player.x + player.w / 2, player.y, -8));
            player.cooldown = 15;
        }
    }, {passive: false});
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const touchX = e.touches[0].clientX - (window.innerWidth - width)/2;
        player.x = Math.max(0, Math.min(width - player.w, touchX - player.w / 2));
    }, {passive: false});

</script>
</body>
</html>
